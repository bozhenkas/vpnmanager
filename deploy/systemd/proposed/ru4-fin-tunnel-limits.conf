# PROPOSED drop-in — ru-4 — install as /etc/systemd/system/ru4-fin-tunnel.service.d/limits.conf
# Rationale: reserve's lifeline ssh tunnel (-L 17905 -> FIN), RSS ~8 MB.
# Tiny cap; negative OOM so it is not collateral on the 576 MB box.
[Service]
MemoryHigh=24M
MemoryMax=48M
CPUQuota=15%
OOMScoreAdjust=-100
