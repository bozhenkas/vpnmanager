# PROPOSED drop-in — RU — install as /etc/systemd/system/telegram-proxy-tunnel.service.d/limits.conf
# Rationale: ssh -N tunnel, RSS ~2 MB. Tiny cap guards against leaks.
# Lifeline for both bots' Telegram egress -> negative OOM score (die after bots).
[Service]
MemoryHigh=24M
MemoryMax=48M
CPUQuota=15%
OOMScoreAdjust=-100
