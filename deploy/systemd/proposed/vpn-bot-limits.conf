# PROPOSED drop-in — RU — install as /etc/systemd/system/vpn-bot.service.d/limits.conf
# Rationale: observed RSS ~41 MB. Soft-throttle at 120M, hard-kill at 200M.
# Non-critical bot: high OOM score so it dies before xray/tunnels under pressure.
[Service]
MemoryHigh=120M
MemoryMax=200M
CPUQuota=50%
OOMScoreAdjust=600
