# PROPOSED drop-in — ru-4 (576 MB box) — install as /etc/systemd/system/x-ui.service.d/limits.conf
# Rationale: 3x-ui panel + its xray child, RSS ~100 MB combined. Panel can grow;
# on a 576 MB box a hard cap is essential. Control-plane (panel), neutral OOM.
[Service]
MemoryHigh=150M
MemoryMax=220M
CPUQuota=80%
OOMScoreAdjust=0
