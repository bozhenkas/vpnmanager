upstream goida_infra_app {
    server 127.0.0.1:9082;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name anal.goida.fun;

    ssl_certificate /etc/letsencrypt/live/anal.goida.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anal.goida.fun/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://goida_infra_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }
}
