# P.14 GOIDA_SMART2 — TCP passthrough на remnanode :17449
# Слушает ТОЛЬКО backup IP (45.91.53.93), не 0.0.0.0:7443.
# Клиент: vless+xhttp+reality → 45.91.53.93:7443 → stream → 127.0.0.1:17449 (GOIDA_SMART2).
# flow="" на ingress; routing = GOIDA_SMART (YT/Discord zapret, Telegram→balancer).
#
# deploy:
#   cp deploy/nginx/remna-smart2-7443.conf /etc/nginx/stream.d/remna-smart2-7443.conf
#   nginx -t && systemctl reload nginx
# firewall: allow 7443/tcp только на 45.91.53.93 (не на primary 45.91.54.152)

stream {
    upstream remna_smart2_xhttp {
        server 127.0.0.1:17449;
    }

    server {
        listen 45.91.53.93:7443;
        proxy_pass remna_smart2_xhttp;
        proxy_connect_timeout 30s;
        proxy_timeout 3600s;
    }
}
