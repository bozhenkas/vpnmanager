# Remnawave WS inbounds (VLESS+WebSocket+TLS, loopback 127.0.0.1:17443..17448)
# ВАЖНО: транспорт = WebSocket, поэтому proxy_pass http:// + Upgrade, НЕ grpc_pass.
upstream remna_smart  { server 127.0.0.1:17443; keepalive 32; }
upstream remna_direct { server 127.0.0.1:17444; keepalive 32; }
upstream remna_fin    { server 127.0.0.1:17445; keepalive 32; }
upstream remna_fra    { server 127.0.0.1:17446; keepalive 16; }
upstream remna_swe    { server 127.0.0.1:17447; keepalive 32; }
upstream remna_home   { server 127.0.0.1:17448; keepalive 16; }

# Hydra (сторонние) WS inbounds на Remnawave (rw-core loopback). usa отсутствует.
upstream remna_hydra_nl  { server 127.0.0.1:17460; keepalive 16; }
upstream remna_hydra_de  { server 127.0.0.1:17461; keepalive 16; }
upstream remna_hydra_pol { server 127.0.0.1:17463; keepalive 16; }
upstream remna_hydra_tur { server 127.0.0.1:17464; keepalive 16; }

# Subscription/bot engine
upstream xray_sub  { server 127.0.0.1:9090; keepalive 8; }

# 2026-07-05: токен подписки не менять в URL (ссылки клиентов не трогать), но не давать
# ему оседать в access-логе открытым текстом — маскируем перед записью в отдельный лог.
map $request_uri $goida_safe_uri {
    ~^(?<pfx>/(?:subscribe|subscribe-next|subscribe-old|happ)/)[^/]+(?<rest>.*)$ "${pfx}REDACTED${rest}";
    default $request_uri;
}
log_format goida_redacted '$remote_addr - [$time_local] "$request_method $goida_safe_uri $server_protocol" '
                           '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

# rate-limit по IP на подписочные пути — не завязан на сам токен/URL.
limit_req_zone $binary_remote_addr zone=goida_sub:10m rate=20r/m;

server {
    listen 443 ssl;
    server_name ru.goida.fun;

    ssl_certificate /etc/letsencrypt/live/ru.goida.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ru.goida.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # отдельный лог этого vhost с маскированным токеном; остальные vhosts на боксе
    # продолжают писать в общий /var/log/nginx/access.log без изменений.
    access_log /var/log/nginx/ru.goida.fun-access.log goida_redacted;

    client_max_body_size 0;
    root /var/www/html;
    index index.html;

    # Remnawave WS inbounds. Обычный HTTP без Upgrade уходит редиректом на сайт.
    location ^~ /smart     { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_smart;  include /etc/nginx/proxy_params; }
    location ^~ /direct    { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_direct; include /etc/nginx/proxy_params; }
    location ^~ /home      { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_home;   include /etc/nginx/proxy_params; }
    location ^~ /fin       { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_fin;    include /etc/nginx/proxy_params; }
    location ^~ /fra       { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_fra;    include /etc/nginx/proxy_params; }
    location ^~ /swe       { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_swe;    include /etc/nginx/proxy_params; }

    # Backward compat: старый путь из 3X-UI подписок (/fi → fin). /se убран 2026-07-06 (не использовался).
    location ^~ /fi        { if ($http_upgrade !~* websocket) { return 302 /; } rewrite ^/fi(/?.*)$ /fin$1 break; proxy_pass http://remna_fin;    include /etc/nginx/proxy_params; }

    # Hydra (сторонние) WS inbounds. Пути из подписки: /hydra-{nl,de,pol,tur}.
    location ^~ /hydra-nl  { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_hydra_nl;  include /etc/nginx/proxy_params; }
    location ^~ /hydra-de  { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_hydra_de;  include /etc/nginx/proxy_params; }
    location ^~ /hydra-pol { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_hydra_pol; include /etc/nginx/proxy_params; }
    location ^~ /hydra-tur { if ($http_upgrade !~* websocket) { return 302 /; } proxy_pass http://remna_hydra_tur; include /etc/nginx/proxy_params; }

    # Subscription engine (vpn-bot)
    location /subscribe/ {
        limit_req zone=goida_sub burst=10 nodelay;
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
    location /subscribe-next/ {
        limit_req zone=goida_sub burst=10 nodelay;
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
    location /subscribe-old/ {
        limit_req zone=goida_sub burst=10 nodelay;
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
    location /happ/ {
        limit_req zone=goida_sub burst=10 nodelay;
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
    # /wl/list убран 2026-07-05: отдавал тот же файл, что /wl/share (маскировка {uuid}
    # происходит при записи на диск, не при отдаче), но без токена и IP-allowlist —
    # был публичным обходом уже существующей защиты. Партнёрам — только /wl/share.
    location = /wl/list { return 404; }
    location = /wl/share {
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }
    location = /routing/share {
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }
    location /notify {
        allow 78.107.88.21;
        deny all;
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }
    location /rknstatus {
        allow 78.107.88.21;
        deny all;
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }
    # /routing.json убран 2026-07-05: раньше отдавался публично (CORS *), Happ-клиенты
    # роутинг получают встроенным в подписку (happ://routing/onadd/), не отсюда.
    # Внешним потребителям (Lekanta) — только /routing/share?token=.
    location = /routing.json { return 404; }

    location / { try_files $uri $uri/ /index.html; }
}
