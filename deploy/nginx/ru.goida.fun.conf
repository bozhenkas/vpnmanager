upstream xray_fi { server 127.0.0.1:10001; keepalive 32; }
upstream xray_se { server 127.0.0.1:10002; keepalive 32; }
upstream xray_smart { server 127.0.0.1:10003; keepalive 32; }
upstream xray_direct { server 127.0.0.1:10004; keepalive 32; }
upstream xray_smart_pro { server 127.0.0.1:10005; keepalive 32; }
upstream xray_usa { server 127.0.0.1:10011; keepalive 16; }
upstream xray_pol { server 127.0.0.1:10012; keepalive 16; }
upstream xray_tur { server 127.0.0.1:10013; keepalive 16; }
upstream xray_nl { server 127.0.0.1:10014; keepalive 16; }
upstream xray_de { server 127.0.0.1:10015; keepalive 16; }
upstream xray_fiws { server 127.0.0.1:10016; keepalive 16; }
upstream xray_sub { server 127.0.0.1:9090; keepalive 8; }
upstream xray_xhttp_test { server 127.0.0.1:10020; keepalive 16; }

server {
    listen 443 ssl http2;
    server_name ru.goida.fun;

    ssl_certificate /etc/letsencrypt/live/ru.goida.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ru.goida.fun/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location /fi { proxy_pass http://xray_fi; include /etc/nginx/proxy_params; }
    location /se { proxy_pass http://xray_se; include /etc/nginx/proxy_params; }
    location /smart { proxy_pass http://xray_smart; include /etc/nginx/proxy_params; }
    location /smart-pro { proxy_pass http://xray_smart_pro; include /etc/nginx/proxy_params; }
    location /direct { proxy_pass http://xray_direct; include /etc/nginx/proxy_params; }
    location /home { proxy_pass http://xray_direct; include /etc/nginx/proxy_params; }
    location /usa-out { proxy_pass http://xray_usa; include /etc/nginx/proxy_params; }
    location /pol-out { proxy_pass http://xray_pol; include /etc/nginx/proxy_params; }
    location /tur-out { proxy_pass http://xray_tur; include /etc/nginx/proxy_params; }
    location /nl-out { proxy_pass http://xray_nl; include /etc/nginx/proxy_params; }
    location /de-out { proxy_pass http://xray_de; include /etc/nginx/proxy_params; }
    location /fi-out { proxy_pass http://xray_fiws; include /etc/nginx/proxy_params; }
    location /xhttp-test {
        proxy_pass http://xray_xhttp_test;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 0;
        tcp_nodelay on;
        proxy_socket_keepalive on;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
    
    location /subscribe/ {
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /subscribe-next/ {
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /subscribe-old/ {
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /wl/list {
        alias /opt/wl-registry/wl-list.txt;
        default_type text/plain;
    }

    location /notify {
        allow 78.107.88.21;
        deny all;
        proxy_pass http://xray_sub;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }

    location / { root /var/www/html; index index.html; }
}
