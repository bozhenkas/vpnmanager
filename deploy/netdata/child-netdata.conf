# CHILD NODES — netdata.conf
# Install: /etc/netdata/netdata.conf on RU, FIN, SWE, ru-4, HOME
# For static installs (FIN/SWE): /opt/netdata/etc/netdata/netdata.conf

[global]
    run as user = netdata
    profile = child
[db]
    mode = dbengine
[web]
    bind to = 127.0.0.1
    allow connections from = localhost
[logs]
    debug log = none
    access log = none
