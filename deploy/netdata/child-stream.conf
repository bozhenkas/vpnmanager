# CHILD NODES — stream.conf (sender)
# Install: /etc/netdata/stream.conf on RU, FIN, SWE, ru-4, HOME
# For static installs (FIN/SWE): /opt/netdata/etc/netdata/stream.conf
# IMPORTANT: replace <API_KEY> with the actual UUID from secrets-and-logic.md

[stream]
    enabled = yes
    destination = 95.163.152.210:19999
    api key = <API_KEY>
    timeout seconds = 60
    send charts matching = *
