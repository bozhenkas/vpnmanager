# FRA PARENT — netdata.conf
# Install: /etc/netdata/netdata.conf on FRA (95.163.152.210)

[global]
    run as user = netdata
    page cache size = 32
[db]
    mode = dbengine
    dbengine multihost disk space MB = 512
[web]
    bind to = *
    allow connections from = *
    allow dashboard from = localhost 127.0.0.1
[logs]
    debug log = none
    access log = none
