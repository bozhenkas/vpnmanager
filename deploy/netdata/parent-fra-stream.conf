# FRA PARENT — stream.conf (receiver)
# Install: /etc/netdata/stream.conf on FRA (95.163.152.210)
# IMPORTANT: replace <API_KEY> with the actual UUID from secrets-and-logic.md
#
# Fix applied 2026-06-15: Netdata v2 requires `type = api` in the API key section;
# without it the parent rejects all child connections with "API key is not enabled".

[stream]
    enabled = no

[<API_KEY>]
    type = api
    enabled = yes
    allow from = *
    db = dbengine
    health enabled = auto
    postpone alerts on connect = 1m
