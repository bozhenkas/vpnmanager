<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>glass demo</title>
<link rel="preload" href="/fonts/Inter-Regular.ttf" as="font" type="font/truetype" crossorigin>
<style>
  @font-face { font-family:"Inter"; src:url("/fonts/Inter-Regular.ttf") format("truetype"); font-weight:400; font-display:block; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{ --ls:-0.04em; }
  html,body{height:100%;}
  body{
    font-family:"Inter",system-ui,sans-serif; letter-spacing:var(--ls);
    color:#fff; -webkit-font-smoothing:antialiased;
    display:grid; place-items:center; min-height:100dvh;
    transition:background .4s ease;
  }

  /* ── 5 background variants ── */
  body[data-variant="1"]{ /* Blueprint — Apple-beta technical blue */
    background:
      linear-gradient(rgba(130,180,255,.09) 1px, transparent 1px) 0 0/30px 30px,
      linear-gradient(90deg, rgba(130,180,255,.09) 1px, transparent 1px) 0 0/30px 30px,
      radial-gradient(125% 90% at 50% -12%, #1a3c7d 0%, #0c1f44 52%, #060f28 100%);
  }
  body[data-variant="2"]{ /* Graphite mesh — Apple Pro */
    background:
      radial-gradient(58% 50% at 18% 12%, rgba(150,160,185,.20), transparent 60%),
      radial-gradient(52% 44% at 86% 24%, rgba(95,105,130,.18), transparent 60%),
      radial-gradient(72% 60% at 62% 104%, rgba(70,76,96,.24), transparent 64%),
      linear-gradient(158deg, #1c1c20, #0c0c0e);
  }
  body[data-variant="3"]{ /* Indigo aurora mesh — premium dopamine */
    background:
      radial-gradient(55% 45% at 14% 8%, rgba(94,92,230,.60), transparent 60%),
      radial-gradient(52% 42% at 92% 20%, rgba(191,90,242,.46), transparent 60%),
      radial-gradient(62% 56% at 72% 104%, rgba(10,132,255,.50), transparent 62%),
      linear-gradient(160deg, #161433, #0a0a18);
  }
  body[data-variant="4"]{ /* Midnight emerald — secure */
    background:
      radial-gradient(55% 45% at 16% 10%, rgba(48,209,158,.42), transparent 60%),
      radial-gradient(50% 40% at 90% 28%, rgba(10,132,255,.30), transparent 60%),
      radial-gradient(72% 60% at 60% 106%, rgba(18,120,92,.50), transparent 64%),
      linear-gradient(160deg, #062a22, #03120d);
  }
  body[data-variant="5"]{ /* Titanium warm — iPhone Pro */
    background:
      radial-gradient(56% 46% at 20% 12%, rgba(220,190,148,.32), transparent 60%),
      radial-gradient(50% 40% at 86% 26%, rgba(160,138,116,.28), transparent 60%),
      radial-gradient(72% 60% at 60% 104%, rgba(96,84,70,.44), transparent 64%),
      linear-gradient(158deg, #2b2720, #16130f);
  }

  .phone{ width:min(390px,94vw); padding:22px 18px 28px; }

  .vlabel{ text-align:center; font-size:13px; color:rgba(255,255,255,.7); margin-bottom:18px; }
  .vlabel b{ color:#fff; }

  .brand{ text-align:center; font-size:30px; font-style:italic; font-family:Georgia,serif; margin-bottom:20px; opacity:.96; }

  /* ── LIQUID GLASS ── */
  .glass{ position:relative; border-radius:26px; overflow:hidden; isolation:isolate; margin-bottom:14px;
    box-shadow: 0 10px 34px rgba(0,0,0,.34), 0 2px 8px rgba(0,0,0,.18); }
  .glass-effect{ position:absolute; inset:0; z-index:0;
    backdrop-filter: blur(2.5px) saturate(1.3); -webkit-backdrop-filter: blur(2.5px) saturate(1.3);
    filter: url(#glass-distortion); }
  .glass-tint{ position:absolute; inset:0; z-index:1; background: rgba(255,255,255,.07); }
  .glass-shine{ position:absolute; inset:0; z-index:2; border-radius:inherit;
    box-shadow:
      inset 1.6px 1.6px 0 rgba(255,255,255,.45),
      inset -1.2px -1.2px 1px rgba(255,255,255,.22),
      inset 0 0 22px rgba(255,255,255,.04); }
  .glass-content{ position:relative; z-index:3; padding:20px; }

  .row{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .muted{ color:rgba(255,255,255,.62); font-size:13px; }
  .uname{ font-size:26px; margin-top:6px; }
  .pill{ font-size:12px; padding:5px 11px; border-radius:999px; background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.18); }
  .urlbox{ margin-top:14px; padding:11px 14px; border-radius:14px; background:rgba(0,0,0,.18);
    border:1px solid rgba(255,255,255,.12); font-size:13px; color:rgba(255,255,255,.78);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cta{ margin-top:14px; width:100%; height:50px; border-radius:15px; border:0; cursor:pointer;
    font-family:inherit; font-size:15px; letter-spacing:var(--ls);
    color:#fff; background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.22);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 6px 18px rgba(0,0,0,.25);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }

  .srow{ display:flex; align-items:center; justify-content:space-between; padding:11px 0; }
  .srow + .srow{ border-top:1px solid rgba(255,255,255,.08); }
  .sname{ font-size:15px; } .sdesc{ font-size:12px; color:rgba(255,255,255,.55); margin-top:2px; }

  /* glass toggle */
  .tg{ position:relative; width:58px; height:34px; border-radius:999px; flex-shrink:0; cursor:pointer;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
    box-shadow: inset 0 1px 2px rgba(0,0,0,.3); transition:background .25s ease; overflow:hidden; }
  .tg::before{ content:""; position:absolute; top:3px; left:3px; width:26px; height:26px; border-radius:50%;
    background:linear-gradient(145deg,#fff,#dfe6ee);
    box-shadow:0 2px 5px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.9);
    transition:transform .28s cubic-bezier(.2,.8,.2,1); }
  .tg.on{ background:var(--accent,rgba(48,209,120,.55)); }
  .tg.on::before{ transform:translateX(24px); }

  /* glass slider */
  .sl{ position:relative; height:10px; border-radius:999px; margin:18px 4px 8px;
    background:rgba(255,255,255,.14); box-shadow: inset 0 1px 2px rgba(0,0,0,.3); }
  .sl-fill{ position:absolute; left:0; top:0; height:100%; width:58%; border-radius:999px;
    background:linear-gradient(90deg, rgba(255,255,255,.5), var(--accent,#4097ff)); }
  .sl-thumb{ position:absolute; top:50%; left:58%; width:30px; height:30px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(145deg,#fff,#e7edf3);
    box-shadow:0 3px 10px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.9); }

  body[data-variant="3"]{ --accent:rgba(94,92,230,.65); }
  body[data-variant="3"] .sl-fill, body[data-variant="3"] .cta{ --accent:#5E5CE6; }
  body[data-variant="4"]{ --accent:rgba(48,209,158,.6); }
  body[data-variant="4"] .sl-fill{ --accent:#30D19E; }
  body[data-variant="5"]{ --accent:rgba(214,184,140,.6); }
  body[data-variant="5"] .sl-fill{ --accent:#D6B88C; }

  .switcher{ position:fixed; left:50%; bottom:calc(18px + env(safe-area-inset-bottom)); transform:translateX(-50%);
    display:flex; gap:8px; padding:7px; border-radius:999px; z-index:10;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(20px) saturate(1.4); backdrop-filter:blur(20px) saturate(1.4);
    box-shadow:0 8px 24px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.3); }
  .switcher button{ width:38px; height:38px; border-radius:50%; border:0; cursor:pointer;
    font-family:inherit; font-size:15px; color:rgba(255,255,255,.7); background:transparent; transition:all .2s; }
  .switcher button.on{ background:#fff; color:#111; box-shadow:0 2px 8px rgba(0,0,0,.25); }
</style>
</head>
<body data-variant="1">
  <div class="phone">
    <div class="vlabel" id="vlabel"></div>
    <div class="brand">goida</div>

    <!-- status glass card -->
    <div class="glass">
      <div class="glass-effect"></div><div class="glass-tint"></div><div class="glass-shine"></div>
      <div class="glass-content">
        <div class="row"><span class="muted">активная подписка</span><span class="pill">2/3 устройства</span></div>
        <div class="uname">bozhenkas</div>
        <div class="urlbox">https://ru.goida.fun/subscribe/ZBiA1p6MqXt1rf74…</div>
        <button class="cta">подключить</button>
      </div>
    </div>

    <!-- settings glass card: toggle + slider -->
    <div class="glass">
      <div class="glass-effect"></div><div class="glass-tint"></div><div class="glass-shine"></div>
      <div class="glass-content">
        <div class="srow"><div><div class="sname">Финляндия 🇫🇮</div><div class="sdesc">прямой выход</div></div><div class="tg on" onclick="this.classList.toggle('on')"></div></div>
        <div class="srow"><div><div class="sname">Швеция 🇸🇪</div><div class="sdesc">прямой выход</div></div><div class="tg" onclick="this.classList.toggle('on')"></div></div>
        <div class="sl"><div class="sl-fill"></div><div class="sl-thumb"></div></div>
        <div class="muted" style="text-align:center">3 устройства · 200₽/мес</div>
      </div>
    </div>
  </div>

  <div class="switcher" id="switcher"></div>

  <!-- liquid glass distortion filter -->
  <svg width="0" height="0" style="position:absolute">
    <filter id="glass-distortion" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="2" seed="7" result="noise"/>
      <feGaussianBlur in="noise" stdDeviation="2.2" result="blurred"/>
      <feDisplacementMap in="SourceGraphic" in2="blurred" scale="68" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

<script>
  const NAMES = {
    1:["1 — Blueprint", "технический чертёж (Apple beta)"],
    2:["2 — Graphite", "графит-меш (Apple Pro)"],
    3:["3 — Indigo aurora", "индиго-фиолет мэш (premium)"],
    4:["4 — Midnight emerald", "тёмный изумруд (secure)"],
    5:["5 — Titanium", "тёплый титан (iPhone Pro)"]
  };
  function setV(v){
    document.body.dataset.variant=v; const n=NAMES[v];
    document.getElementById('vlabel').innerHTML=`<b>${n[0]}</b> · ${n[1]}`;
    document.querySelectorAll('.switcher button').forEach(b=>b.classList.toggle('on', +b.dataset.v===+v));
  }
  const sw=document.getElementById('switcher');
  sw.innerHTML=[1,2,3,4,5].map(v=>`<button data-v="${v}" onclick="setV(${v})">${v}</button>`).join('');
  setV(3);
</script>
</body>
</html>
